services:
  - type: web
    name: epichat-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # Paste your Gemini API key in Render dashboard
      - key: OPENAI_API_KEY
        sync: false   # Optional
      - key: DATABASE_URL
        sync: false   # Paste your Neon PostgreSQL connection string
      - key: JWT_SECRET_KEY
        sync: false   # Optional: set a strong random string for JWT signing
